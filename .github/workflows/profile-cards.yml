# Generates the analytics cards rendered in the profile README
# (profile-summary-card-output/**) and commits them back to main.
# Runs on the default GITHUB_TOKEN — no personal access token needed.
name: Profile analytics cards

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/profile-cards.yml"]

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 1
